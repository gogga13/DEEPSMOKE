<div class="support-widget" id="support-widget">
    <button type="button" class="support-toggle" id="support-toggle" aria-expanded="false" aria-controls="support-panel">&#128172;</button>
    <div class="support-panel" id="support-panel">
        <h3>Підтримка</h3>
        <p>Якщо потрібна допомога з підбором товару або оформленням замовлення, напишіть нам у зручний месенджер.</p>

        <div class="support-actions">
            <a href="https://t.me/MNN003" target="_blank" rel="noopener" class="support-link support-link--telegram">
                Написати в Telegram
            </a>
            <a href="https://www.instagram.com/vape.landdd.d?igsh=MWVpbHQ5MTBrbjZ4cQ%3D%3D&utm_source=qr" target="_blank" rel="noopener" class="support-link support-link--instagram">
                Перейти в Instagram
            </a>
        </div>

        <div class="support-phone">
            Телефон: <a href="tel:+380953600267" class="support-handle">+380953600267</a>
        </div>
    </div>
</div>
<script>
(function () {
    const widget = document.getElementById("support-widget");
    const toggle = document.getElementById("support-toggle");
    if (!widget || !toggle) return;

    toggle.addEventListener("click", function () {
        const isOpen = widget.classList.toggle("is-open");
        toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
    });

    document.addEventListener("click", function (event) {
        if (!widget.contains(event.target)) {
            widget.classList.remove("is-open");
            toggle.setAttribute("aria-expanded", "false");
        }
    });
})();
</script>
