{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Підтвердження входу | VapeLand</title>
    <link rel="stylesheet" href="{% static 'style.css' %}?v=20260326-1">
</head>
<body class="auth-page">
    <div class="glow-bg"></div>
    <div class="container auth-container">
        <div class="auth-card animate-fade">
            <a href="/" class="logo" style="margin-bottom: 30px; display: inline-block;">VAPE <span>LAND</span></a>
            
            <h1 style="font-family: var(--font-title); font-size: 2.2rem; margin-bottom: 20px;">Вхід через <span>Google</span></h1>
            <p style="color: var(--text-gray); margin-bottom: 30px;">
                Ви збираєтеся увійти за допомогою акаунта Google. Продовжити?
            </p>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-primary" style="width: 100%;">Так, продовжити</button>
            </form>
            
            <a href="/" style="display: block; margin-top: 20px; color: var(--text-gray); text-decoration: none;">Скасувати</a>
        </div>
    </div>
</body>
</html>
