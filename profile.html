{% load static %}
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій профіль | VapeLand</title>
    <link rel="stylesheet" href="{% static 'style.css' %}?v=20260326-1">
    <style>
        body { display: block; min-height: 100vh; background-color: var(--bg-black); margin: 0; color: white; }
        .profile-content { display: flex; align-items: center; justify-content: center; padding: 120px 20px 60px; }
        .navbar .container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        /* Картка профілю */
        .auth-card { 
            max-width: 700px; width: 100%; 
            overflow: visible !important; 
            position: relative; 
            background: #111; 
            border: 1px solid var(--border); 
            border-radius: 30px; 
            padding: 40px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-group { position: relative; margin-top: 20px; text-align: left; }
        .input-group label { color: var(--accent-pink); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px; }

        /* Випадаючі списки Нової Пошти */
        .np-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border: 2px solid var(--accent-pink);
            border-radius: 12px;
            z-index: 999999;
            max-height: 250px;
            overflow-y: auto;
            display: none;
            margin-top: 5px;
            box-shadow: 0 10px 50px rgba(217, 70, 239, 0.4);
        }

        .np-item {
            padding: 14px 18px;
            cursor: pointer;
            border-bottom: 1px solid #333;
            color: white;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .np-item:hover {
            background: var(--accent-pink);
            color: black;
            font-weight: 600;
        }

        /* Стилізація скроллбару */
        .np-results::-webkit-scrollbar { width: 6px; }
        .np-results::-webkit-scrollbar-thumb { background: var(--accent-pink); border-radius: 10px; }

        .btn-logout {
            border: 1px solid #ff4444;
            color: #ff4444;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: 600;
        }
        .btn-logout:hover { background: #ff4444; color: white; }
    </style>
</head>
<body>
    <div class="glow-bg"></div>
    
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">VAPE <span>LAND</span></a>
            <a href="/" class="btn-ghost" style="padding: 8px 20px; font-size: 0.7rem; border-radius: 50px; text-decoration: none;">← НА ГОЛОВНУ</a>
        </div>
    </nav>

    <div class="profile-content">
        <div class="auth-card animate-fade">
            <h1 style="font-family: var(--font-title); font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; text-align: center;">Особистий <span>кабінет</span></h1>
            <p style="text-align: center; color: var(--text-gray); margin-bottom: 30px; font-size: 0.9rem;">Клієнт: {{ user.username }} | Знижка: <span style="color: var(--accent-pink);">2%</span></p>

            <form method="POST" autocomplete="off">
                {% csrf_token %}
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="input-group">
                        <label>Ім'я *</label>
                        <input type="text" name="first_name" value="{{ user.first_name }}" class="input-field" required>
                    </div>
                    <div class="input-group">
                        <label>Прізвище</label>
                        <input type="text" name="last_name" value="{{ user.last_name }}" class="input-field">
                    </div>
                </div>

                <div class="input-group">
                    <label>По батькові</label>
                    <input type="text" name="patronymic" value="{{ user.profile.patronymic|default:'' }}" class="input-field">
                </div>

                <div class="input-group">
                    <label>Email *</label>
                    <input type="email" name="email" value="{{ user.email }}" class="input-field" required>
                </div>

                <div class="input-group">
                    <label>Номер телефону</label>
                    <input type="text" name="phone" id="phone_profile" value="{{ user.profile.phone|default:'' }}" class="input-field">
                </div>

                <!-- МІСТО -->
                <div class="input-group">
                    <label>Місто доставки</label>
                    <input type="text" id="np-city" name="city" value="{{ user.profile.city|default:'' }}" class="input-field" placeholder="Почніть вводити місто..." autocomplete="off">
                    <div id="city-results" class="np-results"></div>
                </div>

                <!-- ВІДДІЛЕННЯ -->
                <div class="input-group">
                    <label>Відділення або поштомат</label>
                    <input type="text" id="np-warehouse" name="address" value="{{ user.profile.address|default:'' }}" class="input-field" placeholder="Оберіть місто зі списку" autocomplete="off">
                    <div id="warehouse-results" class="np-results"></div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px;">
                    <button type="submit" class="btn-primary" style="font-size: 0.8rem;">ЗБЕРЕГТИ ЗМІНИ</button>
                    <a href="/accounts/logout/" class="btn-logout" style="font-size: 0.8rem;">ВИЙТИ</a>
                </div>
            </form>
        </div>
    </div>

    <!-- ПІДКЛЮЧЕННЯ БІБЛІОТЕК -->
    <script src="https://cdn.jsdelivr.net/npm/imask"></script>

    <script>
    window.addEventListener('load', function() {
        // ТВІЙ ОСОБИСТИЙ КЛЮЧ
        const API_KEY = '3dee21eda5f96931c5c792aa44dc7d03';
        
        const cityInput = document.getElementById('np-city');
        const cityResults = document.getElementById('city-results');
        const warehouseInput = document.getElementById('np-warehouse');
        const warehouseResults = document.getElementById('warehouse-results');
        const phoneField = document.getElementById('phone_profile');

        let selectedCityRef = "";

        // 1. Маска телефону
        if (typeof IMask !== 'undefined' && phoneField) {
            IMask(phoneField, { mask: '+{38} (000) 000-00-00' });
        }

        // 2. Пошук Міста (API Нова Пошта)
        cityInput.addEventListener('input', async function() {
            const query = this.value.trim();
            if (query.length < 2) { cityResults.style.display = 'none'; return; }

            try {
                const response = await fetch('https://api.novaposhta.ua/v2.0/json/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        apiKey: API_KEY,
                        modelName: 'Address',
                        calledMethod: 'getCities',
                        methodProperties: { FindByString: query, Limit: "10" }
                    })
                });

                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    cityResults.innerHTML = '';
                    data.data.forEach(city => {
                        const div = document.createElement('div');
                        div.className = 'np-item';
                        div.innerText = city.Description;
                        div.onclick = function() {
                            cityInput.value = city.Description;
                            selectedCityRef = city.Ref; // Отримуємо Ref міста для пошуку відділень
                            cityResults.style.display = 'none';
                            warehouseInput.disabled = false;
                            warehouseInput.placeholder = "Шукайте номер або адресу...";
                            warehouseInput.focus();
                            loadWarehouses(""); // Завантажуємо перші відділення
                        };
                        cityResults.appendChild(div);
                    });
                    cityResults.style.display = 'block';
                }
            } catch (e) {
                console.error("Помилка API міста:", e);
            }
        });

        // 3. Пошук Відділення (API Нова Пошта)
        async function loadWarehouses(search) {
            if (!selectedCityRef) return;

            try {
                const response = await fetch('https://api.novaposhta.ua/v2.0/json/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        apiKey: API_KEY,
                        modelName: 'Address',
                        calledMethod: 'getWarehouses',
                        methodProperties: {
                            CityRef: selectedCityRef,
                            FindByString: search,
                            Limit: "50"
                        }
                    })
                });

                const data = await response.json();
                if (data.success && data.data.length > 0) {
                    warehouseResults.innerHTML = '';
                    data.data.forEach(wh => {
                        const div = document.createElement('div');
                        div.className = 'np-item';
                        div.innerText = wh.Description;
                        div.onclick = function() {
                            warehouseInput.value = wh.Description;
                            warehouseResults.style.display = 'none';
                        };
                        warehouseResults.appendChild(div);
                    });
                    warehouseResults.style.display = 'block';
                }
            } catch (e) {
                console.error("Помилка API відділення:", e);
            }
        }

        warehouseInput.addEventListener('input', function() { loadWarehouses(this.value); });
        warehouseInput.addEventListener('focus', function() { if(selectedCityRef) loadWarehouses(""); });

        // Закриття списків при кліку мимо
        document.addEventListener('click', (e) => {
            if (e.target !== cityInput) cityResults.style.display = 'none';
            if (e.target !== warehouseInput) warehouseResults.style.display = 'none';
        });
    });
    </script>
</body>
</html>
